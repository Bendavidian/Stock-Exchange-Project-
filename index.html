<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockEx — Nasdaq Search</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="public/2.png" />
  <link rel="apple-touch-icon" href="public/2.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="StockEx — Nasdaq Search" />
  <meta property="og:description" content="Real-time quotes, company profiles and side-by-side comparisons." />
  <meta property="og:image" content="public/2.png" />
  <meta property="og:type" content="website" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="ink-page-bg" aria-hidden="true">
    <img
      src="public/1.png"
      alt=""
      class="ink-page-bg__image"
    />
    <canvas id="ink-reveal-canvas" class="ink-page-bg__canvas"></canvas>
  </div>

  <!-- Animated shader background — same z-index:0, later in DOM = on top.
       Fades to opacity:0 on mouse activity so the ink-reveal layer shows. -->
  <canvas id="shader-bg-canvas" class="shader-bg-canvas" aria-hidden="true"></canvas>

  <!-- Falling particles / shooting-star layer — above shader, below all UI. -->
  <canvas id="particles-canvas" class="particles-canvas" aria-hidden="true"></canvas>

  <div id="marquee-container" class="marquee-container">
    <div id="marquee-track" class="marquee-track"></div>
  </div>

  <main class="main-container">
    <header class="page-header">
      <a href="index.html" class="site-logo-link">
        <img
          src="public/2.png"
          alt="StockEx"
          class="site-logo"
        />
      </a>
      <h1 class="main-title">Search Nasdaq Stocks</h1>
      <p class="subtitle">Real-time quotes, company profiles &amp; side-by-side comparisons</p>
    </header>

    <div id="compare-bar" class="compare-bar hidden">
      <div class="compare-bar__inner">
        <span class="compare-bar__label">Compare:</span>
        <div id="compare-chips" class="compare-chips"></div>
        <a id="compare-link" href="compare.html" class="btn btn--primary">View Comparison</a>
        <button id="compare-clear" class="btn btn--ghost">Clear All</button>
      </div>
    </div>

    <section class="search-section">
      <div id="form-container" class="form-container">
        <div class="search-box">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            id="search-input"
            type="text"
            class="search-input"
            placeholder="Search by company name or ticker symbol&hellip;"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="search-clear-btn" class="search-clear-btn hidden" aria-label="Clear search">&#10005;</button>
        </div>
        <div id="autocomplete-list" class="autocomplete-list hidden"></div>
      </div>
    </section>

    <section id="results-container" class="results-container hidden">
      <div id="loading-indicator" class="loading-indicator hidden">
        <div class="spinner"></div>
        <span>Searching&hellip;</span>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">&#128269;</div>
        <p>No results found.</p>
        <span>Try a different company name or ticker symbol.</span>
      </div>
      <div id="results-grid" class="results-grid"></div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/shaderBackground.js"></script>
  <script type="module" src="js/fallingParticles.js"></script>
</body>
</html>
